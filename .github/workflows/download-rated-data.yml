name: Download Dune Data and Run SCI

on:
  workflow_dispatch:

jobs:
  download-and-analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests pandas numpy matplotlib dune-client
        
    - name: Download Dune data
      env:
        DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
      run: |
        python << 'EOF'
        import os
        import pandas as pd
        from datetime import datetime
        from dune_client.client import DuneClient
        from dune_client.query import QueryBase
        
        print("=" * 60)
        print("Dune Analytics 데이터 다운로드")
        print("=" * 60)
        
        API_KEY = os.environ.get('DUNE_API_KEY')
        
        if not API_KEY:
            print("❌ DUNE_API_KEY 없음!")
            exit(1)
        
        print("✅ API Key 확인됨")
        
        # Dune Client 초기화
        dune = DuneClient(API_KEY)
        
        # Query ID (hildobby's ETH Staking query)
        # 여러 후보 query - 하나씩 시도
        query_candidates = [
            1193962,  # hildobby - ETH Staking Entities
            2509608,  # Alternative query
            3391489,  # Another option
        ]
        
        data = None
        
        for query_id in query_candidates:
            try:
                print(f"\n📡 Query {query_id} 시도 중...")
                
                # Query 실행
                query = QueryBase(query_id=query_id)
                results = dune.run_query(query)
                
                # 결과 확인
                if results and hasattr(results, 'result') and results.result:
                    rows = results.result.rows
                    
                    if rows:
                        print(f"✅ 성공! {len(rows)} rows")
                        data = rows
                        break
                    else:
                        print(f"⚠️  Query {query_id}: 데이터 없음")
                else:
                    print(f"⚠️  Query {query_id}: 결과 없음")
                    
            except Exception as e:
                print(f"❌ Query {query_id} 실패: {e}")
                continue
        
        if not data:
            print("\n❌ 모든 query 실패!")
            print("\n대안: Dune Premium으로 CSV 직접 다운로드 필요")
            exit(1)
        
        # DataFrame 생성
        df = pd.DataFrame(data)
        
        print(f"\n📋 받은 컬럼: {df.columns.tolist()}")
        print(f"\n🔍 데이터 샘플:")
        print(df.head())
        
        # 컬럼 매핑 (query마다 다를 수 있음)
        # 가능한 컬럼명들 시도
        date_col = None
        entity_col = None
        staked_col = None
        
        for col in df.columns:
            col_lower = col.lower()
            if 'date' in col_lower or 'time' in col_lower or 'day' in col_lower:
                date_col = col
            if 'entity' in col_lower or 'pool' in col_lower or 'name' in col_lower:
                entity_col = col
            if 'stake' in col_lower or 'eth' in col_lower or 'amount' in col_lower:
                staked_col = col
        
        if not all([date_col, entity_col, staked_col]):
            print(f"\n⚠️  컬럼 자동 매핑 실패")
            print(f"   date: {date_col}")
            print(f"   entity: {entity_col}")
            print(f"   staked: {staked_col}")
            print(f"\n수동 확인 필요 - CSV 직접 다운로드 권장")
            exit(1)
        
        # 데이터 정리
        result = pd.DataFrame({
            'date': pd.to_datetime(df[date_col]).dt.strftime('%Y-%m-%d'),
            'entity': df[entity_col],
            'staked_eth': df[staked_col]
        })
        
        # 정렬
        result = result.sort_values(['date', 'staked_eth'], ascending=[True, False])
        
        # 통계
        print(f"\n📊 데이터 요약:")
        print(f"   기간: {result['date'].min()} ~ {result['date'].max()}")
        print(f"   Entities: {result['entity'].nunique()}")
        print(f"   Total rows: {len(result)}")
        
        print(f"\n📊 최신 Top 10:")
        latest = result[result['date'] == result['date'].max()]
        print(latest.head(10).to_string(index=False))
        
        # 저장
        os.makedirs('data/raw', exist_ok=True)
        result.to_csv('data/raw/staking_data.csv', index=False)
        
        print(f"\n💾 저장: data/raw/staking_data.csv")
        
        EOF
        
    - name: Verify data
      run: |
        echo "=== CSV 확인 ==="
        head -20 data/raw/staking_data.csv
        echo ""
        echo "=== 데이터 통계 ==="
        tail -n +2 data/raw/staking_data.csv | wc -l
        
    - name: Run SCI Calculator
      run: |
        python sci_calculator_v2.py
        
    - name: Show results
      run: |
        echo "=== Table 4 ==="
        cat data/processed/table4_sci_summary.csv
        
    - name: Upload figures
      uses: actions/upload-artifact@v4
      with:
        name: sci-figures
        path: figures/*.png
        
    - name: Upload tables
      uses: actions/upload-artifact@v4
      with:
        name: sci-tables
        path: data/processed/*.csv
