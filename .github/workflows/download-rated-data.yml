name: Download Rated Data and Run SCI

on:
  workflow_dispatch:

jobs:
  download-and-analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests pandas numpy matplotlib
        
    - name: Download Rated.network data
      env:
        RATED_API_KEY: ${{ secrets.RATED_API_KEY }}
      run: |
        python << 'EOF'
        import requests
        import pandas as pd
        from datetime import datetime
        import os
        
        print("=" * 60)
        print("Rated.network API 데이터 다운로드")
        print("=" * 60)
        
        API_KEY = os.environ.get('RATED_API_KEY')
        
        if not API_KEY:
            print("❌ RATED_API_KEY 없음!")
            exit(1)
        
        print(f"✅ API Key 확인됨")
        
        BASE_URL = "https://api.rated.network/v1/eth"
        
        headers = {
            'Authorization': f'Bearer {API_KEY}',
            'X-Rated-Network': 'mainnet'
        }
        
        params = {
            'entityType': 'pool',
            'window': 'all',
            'limit': 1000,
            'sortBy': 'validatorCount',
            'sortOrder': 'desc'
        }
        
        url = f"{BASE_URL}/entities/summaries"
        
        print(f"\n📡 API 호출: {url}")
        
        try:
            response = requests.get(url, headers=headers, params=params, timeout=30)
            
            print(f"📥 Response Status: {response.status_code}")
            
            response.raise_for_status()
            
            data = response.json()
            
            # 'results' 키 사용 (Rated API v1)
            if 'results' in data:
                entities = data['results']
                print(f"\n✅ 성공! {len(entities)} entities")
                
                df = pd.DataFrame(entities)
                
                print(f"📋 받은 컬럼: {df.columns.tolist()}")
                
                # 데이터 정리
                result = pd.DataFrame({
                    'date': datetime.now().strftime('%Y-%m-%d'),
                    'entity': df['id'],
                    'staked_eth': df['validatorCount'] * 32
                })
                
                result = result.sort_values('staked_eth', ascending=False)
                
                print(f"\n📊 Entity Top 20:")
                print(result.head(20).to_string(index=False))
                
                print(f"\n📈 통계:")
                print(f"   Total Entities: {len(result)}")
                print(f"   Total Staked ETH: {result['staked_eth'].sum():,.0f}")
                
                # 저장
                os.makedirs('data/raw', exist_ok=True)
                result.to_csv('data/raw/staking_data.csv', index=False)
                
                print(f"\n💾 저장: data/raw/staking_data.csv")
                
                # 검증
                saved = pd.read_csv('data/raw/staking_data.csv')
                print(f"✅ 검증: {len(saved)} rows 저장됨")
                
            else:
                print(f"\n❌ 'results' 키 없음")
                print(f"   Keys: {data.keys()}")
                exit(1)
                
        except Exception as e:
            print(f"\n❌ 에러: {e}")
            import traceback
            traceback.print_exc()
            exit(1)
        
        EOF
        
    - name: Verify data
      run: |
        echo "=== CSV 확인 ==="
        head -20 data/raw/staking_data.csv
        echo ""
        echo "=== Entity 개수 ==="
        tail -n +2 data/raw/staking_data.csv | wc -l
        
    - name: Run SCI Calculator
      run: |
        python sci_calculator_v2.py
        
    - name: Show results
      run: |
        echo "=== Table 4 ==="
        cat data/processed/table4_sci_summary.csv
        
    - name: Upload figures
      uses: actions/upload-artifact@v4
      with:
        name: sci-figures
        path: figures/*.png
        
    - name: Upload tables
      uses: actions/upload-artifact@v4
      with:
        name: sci-tables
        path: data/processed/*.csv
