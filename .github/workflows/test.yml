name: Test SCI Calculator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install packages
      run: pip install -r requirements.txt
        
    - name: Run calculator
      run: python sci_calculator_v2.py
        
    - name: Check results
      run: |
        ls figures/
        ls data/processed/
        
    - name: Upload figures
      uses: actions/upload-artifact@v4
      with:
        name: sci-figures
        path: figures/
        
    - name: Upload tables
      uses: actions/upload-artifact@v4
      with:
        name: sci-tables
        path: data/processed/
