## 🧪 GitHub Actions 작동 확인

코드를 Push하면 자동으로:

1. ✅ Python 3.11 설치
2. ✅ 패키지 설치 (`pip install -r requirements.txt`)
3. ✅ SCI 계산 실행 (`python sci_calculator_v2.py`)
4. ✅ Figure 1, 2 생성 확인
5. ✅ Table 4, Appendix A1 생성 확인
6. ✅ 결과를 Artifact로 다운로드 가능

**결과 확인**:
- GitHub 레포 → **Actions** 탭 → 초록 체크마크 ✅

